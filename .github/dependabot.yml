version: 2
updates:
  # Python deps (requirements.txt)
  - package-ecosystem: "pip"
    directory: "/vllm_orchestrator"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
    # security updates are always created (ignore schedule)

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-minor:
        update-types: ["minor", "patch"]

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/vllm_orchestrator"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
