name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9 mypy==1.11.2

      - name: Ruff check
        working-directory: vllm_orchestrator
        run: |
          ruff check src/ tests/ --output-format=github || true
          # non-blocking (현재 legacy code에 위반 많음 — 점진 개선)

      - name: Type check (non-blocking)
        working-directory: vllm_orchestrator
        run: |
          mypy src/app --ignore-missing-imports --no-error-summary || true

  test-regression:
    name: Regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        working-directory: vllm_orchestrator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov cryptography

      - name: Run regression suite
        working-directory: vllm_orchestrator
        run: |
          python -m pytest tests/regression/ -v --tb=short --cov=src/app --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: vllm_orchestrator/coverage.xml
          retention-days: 7

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test-regression]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (validate Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: ./vllm_orchestrator
          file: ./vllm_orchestrator/Dockerfile
          push: false
          load: true
          tags: vllm-orchestrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          # Container는 vLLM 없이도 startup 성공 (MockLLM fallback)
          docker run --rm -d --name smoketest -p 8100:8100 \
            -e REQUEST_CACHE_DISABLED=1 \
            -e LLM_BASE_URL=http://127.0.0.1:9 \
            vllm-orchestrator:${{ github.sha }} &
          sleep 15
          # 5번 재시도
          for i in 1 2 3 4 5; do
            if curl -fsS http://localhost:8100/health/ready; then
              echo "health OK"
              break
            fi
            sleep 3
          done
          docker logs smoketest 2>&1 | tail -40 || true
          docker stop smoketest || true

      # Publish to GHCR only on main branch
      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./vllm_orchestrator
          file: ./vllm_orchestrator/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/vllm-orchestrator:latest
            ghcr.io/${{ github.repository_owner }}/vllm-orchestrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: vllm_orchestrator/
          severity: CRITICAL,HIGH
          exit-code: '0'             # non-blocking for now (first-pass)
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        uses: actions/upload-artifact@v7
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          retention-days: 14
