name: Supply Chain (SBOM + Sign)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "image tag to sign (e.g. latest, v0.1.0)"
        required: true
        default: "latest"

permissions:
  contents: write
  packages: write
  id-token: write           # for keyless OIDC signing via cosign

jobs:
  sbom-and-sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "ref=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMG="ghcr.io/${{ github.repository_owner }}/vllm-orchestrator:${{ steps.tag.outputs.ref }}"
          docker pull "$IMG"
          echo "IMG=$IMG" >> $GITHUB_ENV

      # SBOM via syft (Anchore)
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Generate SBOM (SPDX JSON)
        run: |
          syft "$IMG" -o spdx-json > sbom.spdx.json
          syft "$IMG" -o cyclonedx-json > sbom.cyclonedx.json

      - name: Attach SBOM to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom.spdx.json
            sbom.cyclonedx.json

      # Cosign keyless signing via OIDC
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign image (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "$IMG"

      - name: Attest SBOM to image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$IMG"

      - name: Vulnerability scan + attest
        run: |
          # trivy image scan with SARIF output
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest \
            image --format json --output /tmp/trivy.json "$IMG" || true
          # attach as attestation too
        continue-on-error: true
