apiVersion: v1
kind: Service
metadata:
  name: {{ include "vllm-orchestrator.fullname" . }}
  labels: {{- include "vllm-orchestrator.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8100"
spec:
  type: ClusterIP
  selector: {{- include "vllm-orchestrator.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8100
      targetPort: 8100
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vllm-orchestrator.serviceAccountName" . }}
  labels: {{- include "vllm-orchestrator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
