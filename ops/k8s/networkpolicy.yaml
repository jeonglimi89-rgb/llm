# Zero-trust: only allow expected ingress/egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orchestrator-netpol
spec:
  podSelector:
    matchLabels:
      app: vllm-orchestrator
  policyTypes: [Ingress, Egress]
  ingress:
    # ingress-nginx에서만 들어올 수 있음
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8100
    # Prometheus scrape
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 8100
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # vLLM backend (별도 namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vllm-cluster
      ports:
        - protocol: TCP
          port: 8000
    # Jaeger OTLP collector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 4318
