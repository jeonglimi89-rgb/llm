apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  labels:
    app: vllm-orchestrator
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: vllm-orchestrator
  template:
    metadata:
      labels:
        app: vllm-orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8100"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: orchestrator
          image: ghcr.io/your-org/vllm-orchestrator:latest   # ← replace
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8100
          envFrom:
            - configMapRef:
                name: orchestrator-config
            - secretRef:
                name: orchestrator-secrets
          env:
            - name: INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8100
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/ready
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30       # 150s grace for vLLM warmup
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /data
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]   # let in-flight finish
      terminationGracePeriodSeconds: 60
      volumes:
        - name: data
          emptyDir: {}                  # replace with PVC for persistence
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: vllm-orchestrator
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  labels:
    app: vllm-orchestrator
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8100"
spec:
  type: ClusterIP
  selector:
    app: vllm-orchestrator
  ports:
    - name: http
      port: 8100
      targetPort: 8100
---
# Prometheus Operator ServiceMonitor (optional — skip if not using PO)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: orchestrator
  labels:
    app: vllm-orchestrator
    release: prometheus   # match prometheus-operator helm release
spec:
  selector:
    matchLabels:
      app: vllm-orchestrator
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
