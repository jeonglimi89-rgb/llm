# secret.yaml — 배포 전 반드시 실제 값으로 교체
# 더 안전한 방식: `kubectl create secret` CLI 또는 SealedSecrets/External Secrets Operator
apiVersion: v1
kind: Secret
metadata:
  name: orchestrator-secrets
  labels:
    app: vllm-orchestrator
type: Opaque
stringData:
  # vLLM 인증
  LLM_API_KEY: "REPLACE_ME"
  LLM_BASE_URL: "http://vllm.vllm-cluster:8000"

  # API keys whitelist (환경변수로 간단; 장기적으로는 APIKeyStore에 등록 권장)
  API_KEYS: "REPLACE_WITH_COMMA_SEPARATED_KEYS"

  # Redis
  REDIS_URL: "redis://redis:6379/0"

  # Secrets backend
  SECRETS_BACKEND: "file"
  SECRETS_KEY: "REPLACE_WITH_32_CHAR_PASSPHRASE"
  # SECRETS_FILE: "/secrets/orchestrator.enc"   # ConfigMap/volume에서 마운트
