# nginx-ha.conf — HA variant with 2 orchestrator upstreams
# Swap /etc/nginx/nginx.conf with this when running HA topology

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_ha escape=json
        '{'
        '"time":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
        '"uri":"$request_uri","status":$status,"upstream":"$upstream_addr",'
        '"upstream_time":"$upstream_response_time","request_time":$request_time,'
        '"x_request_id":"$http_x_request_id"'
        '}';
    access_log /var/log/nginx/access.log json_ha;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # 2-instance upstream pool with active health checks
    upstream orchestrator_ha {
        least_conn;
        server orchestrator-1:8100 max_fails=2 fail_timeout=15s;
        server orchestrator-2:8100 max_fails=2 fail_timeout=15s;
        keepalive 32;
    }

    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

    server {
        listen 80;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl http2;
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        set $req_id $http_x_request_id;
        if ($req_id = "") { set $req_id $request_id; }
        add_header X-Request-Id $req_id always;
        add_header X-Upstream $upstream_addr always;   # HA debug: 어느 인스턴스가 받았는지 노출

        location /tasks/submit/stream {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://orchestrator_ha;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-Id $req_id;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
            # Failover: next_upstream on error/timeout
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;
        }

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://orchestrator_ha;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-Id $req_id;
            proxy_read_timeout 300s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        location /health/ {
            proxy_pass http://orchestrator_ha;
            access_log off;
        }
    }
}
