# nginx-vllm-ha.conf — nginx fronting 2+ vLLM instances (mock or real)
# Load balancer with health checks + failover for vLLM layer (not orchestrator).
#
# 용도:
#   - Prod: 2 GPU 서버(vllm-a:8000, vllm-b:8000) 앞에 nginx 배치
#   - Test: 2 mock_vllm.py 인스턴스 앞에 배치해서 failover 실증
#
# 연결:
#   Orchestrator.LLM_BASE_URL → http://nginx:8000 (this config)
#   nginx → vllm-a, vllm-b (round-robin + failover)

events { worker_connections 2048; }

http {
    upstream vllm_pool {
        least_conn;
        # max_fails=2 fail_timeout=10s: 2번 실패하면 10초간 skip
        server vllm-a:8000 max_fails=2 fail_timeout=10s;
        server vllm-b:8000 max_fails=2 fail_timeout=10s;
        keepalive 16;
    }

    server {
        listen 8000;

        location /health {
            # 누가 받았는지 확인용
            add_header X-Upstream-vLLM $upstream_addr always;
            proxy_pass http://vllm_pool;
            proxy_http_version 1.1;
            proxy_read_timeout 10s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        location / {
            add_header X-Upstream-vLLM $upstream_addr always;
            proxy_pass http://vllm_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            # LLM 호출은 실패 시 next_upstream 신중하게 (idempotency 없음)
            # 하지만 transport error는 retry 가치 있음
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 15s;
        }
    }
}
