# nginx reverse proxy + TLS termination + vLLM load balancing
#
# Usage (docker-compose --profile proxy):
#   1. Put certificates in ops/nginx/certs/  (fullchain.pem + privkey.pem)
#   2. docker compose --profile proxy up -d
#   3. https://your-domain/tasks/submit

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging with request ID propagation (OTEL trace correlation)
    log_format  json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream":"$upstream_addr",'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"x_request_id":"$http_x_request_id",'
        '"x_trace_id":"$http_traceparent"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain text/event-stream;
    gzip_min_length 1024;

    # Rate limit zone (nginx-level; backend have its own too)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

    # --- Orchestrator upstream (multi-worker) ---
    upstream orchestrator_backend {
        # 여러 orchestrator 인스턴스 추가 시 ip_hash 대신 least_conn 권장
        least_conn;
        server orchestrator:8100 max_fails=3 fail_timeout=30s;
        # server orchestrator-2:8100 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # --- vLLM upstream (HA: multiple instances behind LB) ---
    # 여러 GPU 머신이 있으면 여기에 나열. 현재는 단일 vLLM
    upstream vllm_backend {
        # Round-robin 기본. Canary 배포 시 weight 조절 가능
        server host.docker.internal:8000 max_fails=2 fail_timeout=20s;
        # server vllm-secondary:8000 max_fails=2 fail_timeout=20s backup;   # failover
        # server vllm-canary:8000 weight=1;                                 # canary
        keepalive 8;
    }

    # --- HTTP → HTTPS redirect ---
    server {
        listen 80;
        server_name _;
        # Let's Encrypt challenge path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS API server ---
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS certs mounted from host
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Strong TLS config (Mozilla intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (force HTTPS for 1 year)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer-when-downgrade always;

        # Generate/propagate request id
        set $req_id $http_x_request_id;
        if ($req_id = "") { set $req_id $request_id; }
        add_header X-Request-Id $req_id always;

        # --- Streaming endpoint (SSE): disable buffering ---
        location /tasks/submit/stream {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://orchestrator_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-Id $req_id;
            # SSE essentials
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            chunked_transfer_encoding on;
        }

        # --- Standard API ---
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://orchestrator_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-Id $req_id;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # --- Metrics endpoint (internal only) ---
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://orchestrator_backend;
        }

        # --- Health ---
        location /health/ {
            proxy_pass http://orchestrator_backend;
            access_log off;
        }
    }

    # --- vLLM LB (internal, not exposed to internet) ---
    server {
        listen 8000;
        server_name _;
        location / {
            proxy_pass http://vllm_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 180s;
        }
    }
}
