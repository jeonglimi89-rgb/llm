global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "vllm-orchestrator"
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator:8100"]
        labels:
          service: "orchestrator"
          env: "pilot"

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      # Alertmanager 없으면 조용히 skip — profile 미활성 시에도 prom 기동 가능
      timeout: 10s
