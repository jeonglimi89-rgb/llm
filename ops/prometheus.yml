global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "vllm-orchestrator"
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator:8100"]
        labels:
          service: "orchestrator"
          env: "pilot"

rule_files:
  - /etc/prometheus/alerts.yml
