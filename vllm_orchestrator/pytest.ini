[pytest]
# -----------------------------------------------------------------------------
# Gate-suite boundary (T-tranche-6, 2026-04-08)
#
# The repo has two orthogonal test categories that are NOT part of the default
# deterministic gate and must be opted into explicitly:
#
#   infra  — requires a live external dependency (LLM HTTP server, FastAPI
#            subprocess bootstrap, network/port binding). These tests stall
#            or time out when the dependency is not running. They are NOT
#            regressions when skipped.
#
#   load   — deterministic (FakeLLM-backed) but long-running throughput /
#            soak / queue-saturation tests. They pass in isolation but make
#            the default gate noticeably slower, so they're opted out of the
#            default gate for fast-iteration reasons.
#
# Default gate (`pytest tests/`) runs everything EXCEPT `infra` and `load`.
# This matches the pre-T-tranche-6 deterministic gate count exactly.
#
# To run a specific slice:
#
#   pytest tests/                    # default deterministic gate
#   pytest tests/ -m infra           # infra-dependent only (needs live infra)
#   pytest tests/ -m load            # deterministic load/soak tests
#   pytest tests/ -m ""              # everything (override the default filter)
#
# See docs/testing_gate.md for the full inventory and rationale.
# -----------------------------------------------------------------------------

markers =
    infra: Test requires a live external dependency (LLM HTTP server, subprocess-bootstrapped FastAPI app, real network). Not run in the default deterministic gate. Use `pytest -m infra` to run explicitly when the dependency is available.
    load: Deterministic throughput / soak / queue-saturation test that uses FakeLLM fixtures but is long-running. Excluded from the default gate for speed. Use `pytest -m load` to run explicitly.

addopts = -m "not infra and not load"

filterwarnings =
    ignore::DeprecationWarning
